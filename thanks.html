<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обратная связь | ЕГЭ Математика</title>
    <style>
        :root {
            --bg: #f0f7ff;
            --card-bg: #ffffff;
            --text: #1e2a3a;
            --text-secondary: #555;
            --header-bg: #2c3e50;
            --header-text: #ffffff;
            --accent: #3498db;
            --accent-hover: #2980b9;
            --red: #e63946;
            --shadow: 0 4px 6px rgba(0,0,0,0.1);
            --footer-bg: #2c3e50;
            --footer-text: #ffffff;
        }
        
        .dark-theme {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --text: #e0e0e0;
            --text-secondary: #b0b0b0;
            --header-bg: #0f3460;
            --header-text: #ffffff;
            --accent: #e94560;
            --accent-hover: #c23152;
            --red: #e94560;
            --shadow: 0 4px 6px rgba(0,0,0,0.3);
            --footer-bg: #0f3460;
            --footer-text: #e0e0e0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        header {
            background: var(--header-bg);
            color: var(--header-text);
            padding: 1rem 2rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        nav ul {
            display: flex;
            justify-content: flex-start;
            list-style: none;
            gap: 2rem;
            flex-wrap: wrap;
        }
        nav a {
            color: var(--header-text);
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #f1c40f;
        }
        .theme-toggle {
            background: transparent;
            border: 2px solid var(--header-text);
            color: var(--header-text);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .theme-toggle:hover {
            background: var(--header-text);
            color: var(--header-bg);
        }
        main {
            flex: 1;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        .thanks-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            text-align: left;
        }
        .thanks-card h1 {
            color: var(--text);
            margin-bottom: 1rem;
        }
        .feedback-form {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: var(--shadow);
            text-align: left;
        }
        .feedback-form h2 {
            color: var(--text);
            margin-bottom: 1rem;
        }
        footer {
            text-align: center;
            padding: 1rem;
            background: var(--footer-bg);
            color: var(--footer-text);
            margin-top: 2rem;
        }
        .ege-link {
            color: var(--red);
            text-decoration: none;
            font-weight: bold;
        }
        .ege-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Главная</a></li>
                <li><a href="formulas.html">Формулы</a></li>
                <li><a href="test.html">Тест</a></li>
                <li><a href="thanks.html">Обратная связь</a></li>
            </ul>
        </nav>
        <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙 Тёмная тема</button>
    </header>
    <main>
        <div class="container">
            <div class="thanks-card">
                <h1>Спасибо за внимание!</h1>
                <p>Мы надеемся, что наш сайт помог вам в подготовке к 
                    <a href="https://fipi.ru/ege" class="ege-link" target="_blank">ЕГЭ</a> 
                    по математике.</p>
                <p>Успехов на экзамене! 🎓</p>
            </div>
            <div class="feedback-form">
                <h2>Обратная связь</h2>
                <p>Помогите улучшить сайт — ваше мнение важно!</p>
                <script src="https://forms.yandex.ru/_static/embed.js"></script>
                <iframe src="https://forms.yandex.ru/u/6a00675df47e73870de29242?iframe=1" frameborder="0" name="ya-form-6a00675df47e73870de29242" width="650"></iframe>
            </div>
        </div>
    </main>
    <footer>
        <p>© 2026 Подготовка к ЕГЭ. Все права защищены.</p>
    </footer>

    <script>
        // Ночная тема
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeButton(isDark);
        }
        
        function updateThemeButton(isDark) {
            const btn = document.getElementById('themeToggle');
            if (isDark) {
                btn.textContent = '☀️ Светлая тема';
            } else {
                btn.textContent = '🌙 Тёмная тема';
            }
        }
        
        function applySavedTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') {
                document.body.classList.add('dark-theme');
                updateThemeButton(true);
            } else {
                updateThemeButton(false);
            }
        }
        
        applySavedTheme();
    </script>
</body>
</html>

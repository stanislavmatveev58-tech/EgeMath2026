<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест | ЕГЭ Математика</title>
    <style>
        :root {
            --bg: #f0f7ff;
            --card-bg: #ffffff;
            --text: #1e2a3a;
            --text-secondary: #555;
            --header-bg: #2c3e50;
            --header-text: #ffffff;
            --accent: #3498db;
            --accent-hover: #2980b9;
            --red: #e63946;
            --red-hover: #b91c2c;
            --green: #2ecc71;
            --green-hover: #27ae60;
            --orange: #f39c12;
            --shadow: 0 2px 5px rgba(0,0,0,0.1);
            --input-border: #ccc;
            --footer-bg: #2c3e50;
            --footer-text: #ffffff;
            --solution-bg: #eef2f7;
            --hint-bg: #fff8e1;
            --hint-border: #f39c12;
            --university-bg: #e8f4fd;
        }
        
        .dark-theme {
            --bg: #1a1a2e;
            --card-bg: #16213e;
            --text: #e0e0e0;
            --text-secondary: #b0b0b0;
            --header-bg: #0f3460;
            --header-text: #ffffff;
            --accent: #e94560;
            --accent-hover: #c23152;
            --red: #e94560;
            --red-hover: #c23152;
            --green: #2ecc71;
            --green-hover: #27ae60;
            --orange: #f39c12;
            --shadow: 0 2px 5px rgba(0,0,0,0.3);
            --input-border: #444;
            --footer-bg: #0f3460;
            --footer-text: #e0e0e0;
            --solution-bg: #1a1a2e;
            --hint-bg: #2c2416;
            --hint-border: #f39c12;
            --university-bg: #16213e;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        header {
            background: var(--header-bg);
            color: var(--header-text);
            padding: 1rem 2rem;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        nav ul {
            display: flex;
            justify-content: center;
            list-style: none;
            gap: 2rem;
            flex-wrap: wrap;
        }
        nav a {
            color: var(--header-text);
            text-decoration: none;
            font-weight: bold;
            transition: color 0.3s;
        }
        nav a:hover {
            color: #f1c40f;
        }
        .theme-toggle {
            background: transparent;
            border: 2px solid var(--header-text);
            color: var(--header-text);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .theme-toggle:hover {
            background: var(--header-text);
            color: var(--header-bg);
        }
        main {
            flex: 1;
            padding: 2rem 1rem;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .difficulty-selector {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .difficulty-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 1rem;
        }
        .difficulty-btn {
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .difficulty-btn.easy {
            background: var(--green);
            color: white;
        }
        .difficulty-btn.medium {
            background: var(--orange);
            color: white;
        }
        .difficulty-btn.hard {
            background: var(--red);
            color: white;
        }
        .difficulty-btn.active {
            transform: scale(1.05);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .difficulty-btn:hover {
            opacity: 0.9;
        }
        .question-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
        }
        .question-text {
            font-size: 1.2rem;
            margin-bottom: 1rem;
        }
        .question-image {
            max-width: 100%;
            margin: 1rem 0;
            border-radius: 8px;
        }
        .answer-input {
            width: 100%;
            padding: 0.8rem;
            margin: 1rem 0;
            border: 2px solid var(--input-border);
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s;
            background: var(--card-bg);
            color: var(--text);
        }
        .answer-input:focus {
            border-color: var(--accent);
            outline: none;
        }
        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
            align-items: center;
        }
        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 1rem;
        }
        button:hover {
            background: var(--accent-hover);
        }
        button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        .btn-danger {
            background: var(--red);
        }
        .btn-danger:hover {
            background: var(--red-hover);
        }
        .btn-success {
            background: var(--green);
        }
        .btn-success:hover {
            background: var(--green-hover);
        }
        .btn-hint {
            background: var(--orange);
        }
        .btn-hint:hover {
            background: #e67e22;
        }
        .solution {
            background: var(--solution-bg);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            border-left: 4px solid var(--red);
        }
        .hint-box {
            background: var(--hint-bg);
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1rem;
            border-left: 4px solid var(--hint-border);
        }
        .hint-level {
            font-weight: bold;
            color: var(--orange);
            margin-bottom: 0.5rem;
        }
        .hint-text {
            color: var(--text);
        }
        .result {
            text-align: center;
            margin-top: 2rem;
        }
        .result-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
        }
        .universities {
            background: var(--university-bg);
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1rem;
            text-align: left;
        }
        .universities h4 {
            color: var(--text);
            margin-bottom: 0.5rem;
        }
        .university {
            padding: 0.5rem;
            margin: 0.5rem 0;
            border-left: 3px solid var(--red);
            background: var(--card-bg);
            border-radius: 6px;
            transition: transform 0.2s;
        }
        .university:hover {
            transform: translateX(5px);
        }
        footer {
            text-align: center;
            padding: 1rem;
            background: var(--footer-bg);
            color: var(--footer-text);
            margin-top: 2rem;
        }
        .feedback-correct {
            color: #27ae60;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .feedback-wrong {
            color: #e74c3c;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .hint-count {
            display: inline-block;
            background: var(--orange);
            color: white;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            text-align: center;
            line-height: 24px;
            font-size: 0.8rem;
            margin-left: 5px;
        }
        @media (max-width: 768px) {
            .difficulty-buttons { gap: 0.5rem; }
            .difficulty-btn { padding: 0.5rem 1rem; font-size: 0.9rem; }
        }
    </style>
</head>

    <script>
        // ========== НОЧНАЯ ТЕМА ==========
        function toggleTheme() {
            document.body.classList.toggle('dark-theme');
            const isDark = document.body.classList.contains('dark-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeButton(isDark);
        }
        
        function updateThemeButton(isDark) {
            const btn = document.getElementById('themeToggle');
            if (isDark) {
                btn.textContent = '☀️ Светлая тема';
            } else {
                btn.textContent = '🌙 Тёмная тема';
            }
        }
        
        function applySavedTheme() {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') {
                document.body.classList.add('dark-theme');
                updateThemeButton(true);
            } else {
                updateThemeButton(false);
            }
        }

        // ========== ДАННЫЕ ТЕСТОВ (3 уровня сложности) ==========
        const testsData = {
            easy: [
                { question: "Найдите величину центрального угла, если он на 69° больше острого вписанного угла, опирающегося на ту же дугу. Ответ дайте в градусах.", photo: "https://plcn.s3.yandex.net/resources/01BE6F_20251027_220107.svg", correct_answer: "138", hints: ["💡 Центральный угол в 2 раза больше вписанного.", "💡 Пусть вписанный = α, центральный = 2α. 2α − α = 69°.", "💡 α = 69°, центральный = 138°."], solution: "Центральный угол в 2 раза больше вписанного. Пусть вписанный угол α, тогда центральный 2α. 2α − α = 69° ⇒ α = 69°. Центральный = 2·69° = 138°." },
                { question: "Длины векторов a и b равны 3 и 5, а угол между ними равен 60°. Найдите скалярное произведение a·b.", photo: "", correct_answer: "7,5", hints: ["💡 Формула: a·b = |a|·|b|·cos(угол).", "💡 Подставьте: 3·5·cos60°.", "💡 cos60° = 0,5. Ответ: 3·5·0,5 = 7,5."], solution: "a·b = |a|·|b|·cos60° = 3·5·0,5 = 7,5." },
                { question: "Во сколько раз увеличится объём конуса, если радиус его основания увеличится в 11 раз, а высота останется прежней?", photo: "", correct_answer: "121", hints: ["💡 Объём конуса: V = ⅓πR²h.", "💡 Новый радиус = 11R. V₁ = ⅓π(11R)²h = ⅓π·121R²h.", "💡 V₁ = 121V. Ответ: в 121 раз."], solution: "V = ⅓πR²h. V₁ = ⅓π(11R)²h = 121V." },
                { question: "В сборнике билетов по географии всего 20 билетов, в семи из них встречается вопрос по теме «Физическая география». Найдите вероятность того, что в случайно выбранном на экзамене билете школьнику достанется вопрос по теме «Физическая география».", photo: "", correct_answer: "0,35", hints: ["💡 Вероятность = благоприятные / всего.", "💡 Благоприятных = 7, всего = 20.", "💡 7/20 = 0,35."], solution: "7/20 = 0,35." },
                { question: "В случайном эксперименте симметричную монету бросают дважды. Найдите вероятность того, что орёл не выпадет ни разу.", photo: "", correct_answer: "0,25", hints: ["💡 Все исходы: ОО, ОР, РО, РР.", "💡 Орёл не выпадет = РР.", "💡 1 исход из 4 = 1/4 = 0,25."], solution: "Всего 4 исхода. Благоприятный: РР. P = 1/4 = 0,25." },
                { question: "Найдите корень уравнения: √(36 − 4x) = 2.", photo: "", correct_answer: "8", hints: ["💡 Возведите обе части в квадрат.", "💡 36 − 4x = 4.", "💡 −4x = −32 ⇒ x = 8."], solution: "36 − 4x = 4 ⇒ −4x = −32 ⇒ x = 8." },
                { question: "Найдите значение выражения: (3√8)² / 6.", photo: "", correct_answer: "12", hints: ["💡 (3√8)² = 9·8 = 72.", "💡 72 / 6 = 12."], solution: "(3√8)² = 9·8 = 72. 72/6 = 12." },
                { question: "Найдите значение выражения: (3,2 + 4,8) / 2.", photo: "", correct_answer: "4", hints: ["💡 Сначала сложите числа в скобках: 3,2 + 4,8 = 8.", "💡 Затем разделите результат на 2.", "💡 8 / 2 = 4."], solution: "(3,2 + 4,8) / 2 = 8 / 2 = 4." },
                { question: "Для сматывания кабеля на заводе используют лебёдку, которая равноускоренно наматывает кабель на катушку. Угол, на который поворачивается катушка, изменяется со временем по закону φ = ωt + βt²/2, где t — время в минутах, ω = 15 град/мин — начальная угловая скорость, β = 6 град/мин² — угловое ускорение. Определите время, прошедшее после начала работы лебёдки, если угол намотки φ достиг 2250°. Ответ дайте в минутах.", photo: "", correct_answer: "25", hints: ["💡 2250 = 15t + 3t².", "💡 3t² + 15t − 2250 = 0 ⇒ t² + 5t − 750 = 0.", "💡 t = 25 (положительный корень)."], solution: "2250 = 15t + 3t² ⇒ t² + 5t − 750 = 0 ⇒ t = 25." },
                { question: "Юля и Уля, работая вместе, пропалывают грядку за 24 минуты, а одна Уля — за 120 минут. За сколько минут пропалывает эту грядку одна Юля?", photo: "", correct_answer: "30", hints: ["💡 Производительность вместе = 1/24, Ули = 1/120.", "💡 Юли = 1/24 − 1/120 = 4/120 = 1/30.", "💡 Время Юли = 30 минут."], solution: "1/24 − 1/120 = 4/120 = 1/30. Ответ: 30 минут." },
                { question: "На рисунке изображён график функции вида f(x) = aˣ. Найдите значение f(−3).", photo: "https://plcn.s3.yandex.net/resources/F469FF_20251027_220107.svg", correct_answer: "64", hints: ["💡 Точка (−1;4): 4 = a⁻¹ ⇒ a = 1/4.", "💡 f(x) = (1/4)ˣ.", "💡 f(−3) = (1/4)⁻³ = 4³ = 64."], solution: "4 = a⁻¹ ⇒ a = 1/4. f(−3) = (1/4)⁻³ = 64." },
                { question: "Найдите точку минимума функции y = x^(3/2) − 21x + 11.", photo: "", correct_answer: "196", hints: ["💡 y' = (3/2)√x − 21 = 0.", "💡 √x = 14 ⇒ x = 196.", "💡 Знак меняется с − на +, это минимум."], solution: "y' = (3/2)√x − 21 = 0 ⇒ x = 196." }
            ],
            medium: [
                { question: "Стороны параллелограмма равны 18 и 20. Высота, опущенная на меньшую сторону, равна 10. Найдите высоту, опущенную на большую сторону.", photo: "", correct_answer: "9", hints: ["💡 S = a·hₐ = b·h_b.", "💡 18·10 = 20·h_b.", "💡 h_b = 180/20 = 9."], solution: "18·10 = 20·h_b ⇒ h_b = 9." },
                { question: "Найдите скалярное произведение векторов a(8; 5) * b(7; 3).", photo: "", correct_answer: "71", hints: ["💡 a·b = x₁x₂ + y₁y₂.", "💡 8·7 + 5·3.", "💡 56 + 15 = 71."], solution: "8·7 + 5·3 = 71." },
                { question: "Цилиндр объёмом 18 описан около шара. Найдите объём шара.", photo: "", correct_answer: "12", hints: ["💡 V_цил = πR²·2R = 2πR³ = 18.", "💡 πR³ = 9.", "💡 V_шар = ⁴⁄₃πR³ = 12."], solution: "2πR³ = 18 ⇒ πR³ = 9. V_шар = 12." },
                { question: "Вероятность того, что седьмым по счёту выступит учёный из Португалии, если всего 20 учёных, из них 9 из Португалии.", photo: "", correct_answer: "0,45", hints: ["💡 Номер не влияет на вероятность.", "💡 9 из 20.", "💡 9/20 = 0,45."], solution: "9/20 = 0,45." },
                { question: "Вероятность перегорания одной лампы равна 0,2. Найдите вероятность того, что хотя бы одна из трёх ламп не перегорит.", photo: "", correct_answer: "0,992", hints: ["💡 P = 1 − P(все перегорят).", "💡 P(все) = 0,2³ = 0,008.", "💡 P = 1 − 0,008 = 0,992."], solution: "P = 1 − 0,2³ = 0,992." },
                { question: "Найдите корень уравнения: 3^(x−8) = 1/81.", photo: "", correct_answer: "4", hints: ["💡 1/81 = 3⁻⁴.", "💡 x−8 = −4.", "💡 x = 4."], solution: "1/81 = 3⁻⁴ ⇒ x = 4." },
                { question: "Найдите значение выражения: (∛121 · ∜121) / ¹²√121.", photo: "", correct_answer: "11", hints: ["💡 121^(1/3+1/4-1/12).", "💡 = 121^(1/2).", "💡 = 11."], solution: "121^(1/2) = 11." },
                { question: "Прямая y = 7x − 5 параллельна касательной к графику функции y = x² + 6x − 8. Найдите абсциссу точки касания.", photo: "", correct_answer: "0,5", hints: ["💡 y' = 2x + 6 = 7.", "💡 2x = 1.", "💡 x = 0,5."], solution: "2x + 6 = 7 ⇒ x = 0,5." },
                { question: "Для обогрева помещения используют водяной радиатор. Количество теплоты Q = cm(t₂−t₁), где c = 4200 Дж/(кг·°C), m = 0,5 кг, t₂−t₁ = 40°C. Найдите Q в кДж.", photo: "", correct_answer: "84", hints: ["💡 Q = 4200·0,5·40.", "💡 = 84 000 Дж.", "💡 = 84 кДж."], solution: "Q = 4200·0,5·40 = 84 000 Дж = 84 кДж." },
                { question: "Имеется два сплава. Первый содержит 40% меди, второй — 25% меди. Масса первого сплава на 10 кг больше массы второго. Из этих двух сплавов получили третий сплав, содержащий 35% меди. Найдите массу третьего сплава в килограммах.", photo: "", correct_answer: "30", hints: ["💡 Пусть масса второго x, первого x+10.", "💡 0,4(x+10) + 0,25x = 0,35(2x+10).", "💡 x = 10, третий = 30."], solution: "0,4(x+10) + 0,25x = 0,35(2x+10) ⇒ x = 10. Масса = 30 кг." },
                { question: "На рисунке изображены графики двух линейных функций, пересекающиеся в точке A. Найдите абсциссу точки A.", photo: "https://plcn.s3.yandex.net/resources/1DC3CC_20251027_220107.svg", correct_answer: "4", hints: ["💡 Верхняя прямая: f(x) = x + 4.", "💡 Нижняя прямая: g(x) = 2x.", "💡 x + 4 = 2x ⇒ x = 4."], solution: "f(x) = x + 4, g(x) = 2x. x + 4 = 2x ⇒ x = 4." },
                { question: "Найдите наименьшее значение функции y = x√x − 6x + 3 на отрезке [0; 40].", photo: "", correct_answer: "-29", hints: ["💡 y' = (3/2)√x − 6 = 0.", "💡 √x = 4 ⇒ x = 16.", "💡 y(16) = 64 − 96 + 3 = −29."], solution: "y' = (3/2)√x − 6 = 0 ⇒ x = 16. y(16) = −29." }
            ],
            hard: [
                { question: "В треугольнике ABC угол C равен 90°, AB = 10, BC = √19. Найдите cos A.", photo: "", correct_answer: "0,9", hints: ["💡 AC = √(100−19) = 9.", "💡 cos A = AC/AB.", "💡 = 9/10 = 0,9."], solution: "AC = 9. cos A = 9/10 = 0,9." },
                { question: "Длины векторов a и b равны 3 и 5, угол между ними 60°. Найдите скалярное произведение a·b.", photo: "", correct_answer: "7,5", hints: ["💡 a·b = |a|·|b|·cos60°.", "💡 3·5·0,5.", "💡 = 7,5."], solution: "3·5·0,5 = 7,5." },
                { question: "Дана правильная треугольная призма ABCA₁B₁C₁, площадь основания которой равна 4, а боковое ребро равно 6. Найдите объём многогранника, вершинами которого являются точки B, C, A₁, B₁, C₁.", photo: "https://plcn.s3.yandex.net/resources/370392_20251027_220107.svg", correct_answer: "16", hints: ["💡 V_призмы = 24.", "💡 V_пирамиды = 8.", "💡 Ответ: 24−8 = 16."], solution: "V = 24 − 8 = 16." },
                { question: "На конференцию приехали учёные из трёх стран: 5 из Австрии, 4 из Германии и 6 из Сербии. Найдите вероятность, что десятым окажется доклад учёного из Сербии.", photo: "", correct_answer: "0,4", hints: ["💡 Всего: 5+4+6 = 15.", "💡 Из Сербии: 6.", "💡 P = 6/15 = 0,4."], solution: "6/15 = 0,4." },
                { question: "В торговом центре два автомата с кофе. P(закончится) = 0,3. P(в обоих) = 0,12. Найдите P(останется в обоих).", photo: "", correct_answer: "0,52", hints: ["💡 P(A∪B) = 0,3+0,3−0,12 = 0,48.", "💡 Это вероятность, что закончится хотя бы в одном.", "💡 Ответ: 1−0,48 = 0,52."], solution: "P(A∪B) = 0,48. 1−0,48 = 0,52." },
                { question: "Найдите корень уравнения: ∛(x+3) = 3.", photo: "", correct_answer: "24", hints: ["💡 x+3 = 27.", "💡 x = 24."], solution: "x+3 = 27 ⇒ x = 24." },
                { question: "Найдите tg α, если sin α = √26/26 и α ∈ (0; π/2).", photo: "", correct_answer: "0,2", hints: ["💡 cos²α = 1−26/676 = 25/26.", "💡 cosα = 5/√26.", "💡 tgα = 1/5 = 0,2."], solution: "tgα = 0,2." },
                { question: "На рисунке изображён график y = f'(x). Найдите количество точек минимума f(x) на [−2;6].", photo: "https://plcn.s3.yandex.net/resources/396DA0_20251027_220107.svg", correct_answer: "1", hints: ["💡 Точка минимума: f'=0 и меняет знак с − на +.", "💡 Это x = 3."], solution: "Одна точка: x = 3." },
                { question: "P = σST⁴. S = 1/2401·10²², P = 5,7·10²⁶. Найдите T.", photo: "", correct_answer: "7000", hints: ["💡 T⁴ = 2401·10¹².", "💡 T = 7·10³.", "💡 T = 7000."], solution: "T = 7000." },
                { question: "Расстояние между пристанями 192 км. Плот прошёл 92 км. Скорость течения 4 км/ч. Найдите скорость яхты в неподвижной воде.", photo: "", correct_answer: "20", hints: ["💡 Время плота: 92/4 = 23 ч.", "💡 Время яхты: 20 ч.", "💡 192/(x+4)+192/(x−4)=20 ⇒ x=20."], solution: "x = 20." },
                { question: "На рисунке изображены графики f(x)=ax²+bx+c и g(x)=kx. Найдите абсциссу точки B.", photo: "https://plcn.s3.yandex.net/resources/82DA5C_20251027_220107.svg", correct_answer: "7", hints: ["💡 f(x)=x²−4x, g(x)=3x.", "💡 x²−4x=3x.", "💡 x=7."], solution: "x = 7." },
                { question: "Найдите наименьшее значение функции y = 10 cos x − 14x + 5 на отрезке [−3π/2; 0].", photo: "", correct_answer: "15", hints: ["💡 y' = −10sin x − 14 = 0 не имеет решений.", "💡 y(0) = 15, y(−3π/2) ≈ 71.", "💡 Ответ: 15."], solution: "y(0) = 15." }
            ]
        };

        // Состояние теста
        let testState = {
            currentDifficulty: 'easy',
            currentIndex: 0,
            correctAnswers: 0,
            answers: [],
            wrongQuestions: [],
            isRetryMode: false,
            retryData: null,
            finalScore: 0,
            totalQuestions: 12,
            currentHints: [],
            hintsUsed: 0
        };

        function getCurrentQuestions() {
            if (testState.isRetryMode && testState.retryData) return testState.retryData;
            return testsData[testState.currentDifficulty];
        }

        function normalizeAnswer(ans) {
            return String(ans).trim().toLowerCase().replace(',', '.');
        }

        function renderDifficultySelector() {
            document.querySelectorAll('.difficulty-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.diff === testState.currentDifficulty) btn.classList.add('active');
            });
        }

        function renderQuestion() {
            const container = document.getElementById('test-container');
            const questions = getCurrentQuestions();
            if (testState.currentIndex >= questions.length) {
                finishTest();
                return;
            }
            const q = questions[testState.currentIndex];
            testState.currentHints = [];
            testState.hintsUsed = 0;
            const progress = `Вопрос ${testState.currentIndex+1} из ${questions.length}`;
            let html = `
                <div class="question-card">
                    <div class="question-text"><strong>${progress}</strong><br><br>${q.question}</div>
                    ${q.photo ? `<img src="${q.photo}" class="question-image" alt="Иллюстрация к заданию">` : ''}
                    <input type="text" id="answerInput" class="answer-input" placeholder="Введите ваш ответ">
                    <div class="button-group">
                        <button id="submitBtn">✅ Ответить</button>
                        <button id="hintBtn" class="btn-hint">💡 Подсказка <span class="hint-count">${q.hints ? q.hints.length : 0}</span></button>
                        <button id="skipBtn">⏭ Пропустить</button>
                        <button id="abortBtn" class="btn-danger">✖ Прервать</button>
                    </div>
                    <div id="hintContainer"></div>
                </div>
            `;
            container.innerHTML = html;
            
            document.getElementById('submitBtn').addEventListener('click', submitAnswer);
            document.getElementById('skipBtn').addEventListener('click', skipQuestion);
            document.getElementById('abortBtn').addEventListener('click', abortTest);
            document.getElementById('hintBtn').addEventListener('click', showHint);
            document.getElementById('answerInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') submitAnswer();
            });
            document.getElementById('answerInput').focus();
        }

        function showHint() {
            const q = getCurrentQuestions()[testState.currentIndex];
            if (!q.hints || testState.currentHints.length >= q.hints.length) {
                alert('Подсказки закончились!');
                return;
            }
            const hintLevel = testState.currentHints.length;
            testState.currentHints.push(hintLevel);
            testState.hintsUsed++;
            
            const hintContainer = document.getElementById('hintContainer');
            const hintDiv = document.createElement('div');
            hintDiv.className = 'hint-box';
            hintDiv.innerHTML = `
                <div class="hint-level">🔍 Подсказка ${hintLevel + 1} из ${q.hints.length}:</div>
                <div class="hint-text">${q.hints[hintLevel]}</div>
            `;
            hintContainer.appendChild(hintDiv);
            
            const hintBtn = document.getElementById('hintBtn');
            const remaining = q.hints.length - testState.currentHints.length;
            hintBtn.innerHTML = `💡 Подсказка <span class="hint-count">${remaining}</span>`;
            if (remaining === 0) hintBtn.disabled = true;
        }

        function submitAnswer() {
    const input = document.getElementById('answerInput');
    const userAnswerRaw = input.value.trim();
    
    if (userAnswerRaw === '') {
        alert('Пожалуйста, введите ответ перед отправкой.');
        return;
    }
    
    
    if (isNaN(userAnswerRaw.replace(',', '.'))) {
        alert('Пожалуйста, введите число. Буквы и символы не допускаются.');
        return;
    }
    
    
    const questions = getCurrentQuestions();
            const q = questions[testState.currentIndex];
            const normalizedUser = normalizeAnswer(userAnswerRaw);
            const normalizedCorrect = normalizeAnswer(q.correct_answer);
            const isCorrect = (normalizedUser === normalizedCorrect);
            
            testState.answers.push({
                userAnswer: userAnswerRaw,
                correct: isCorrect,
                question: q.question,
                correctAnswer: q.correct_answer,
                solution: q.solution,
                hintsUsed: testState.hintsUsed
            });
            
            if (isCorrect) {
                testState.correctAnswers++;
                showFeedback(true);
                setTimeout(() => {
                    testState.currentIndex++;
                    renderQuestion();
                }, 1500);
            } else {
                if (!testState.isRetryMode) {
                    testState.wrongQuestions.push(testState.currentIndex);
                }
                showFeedback(false, q.correct_answer, q.solution);
                const nextBtn = document.createElement('button');
                nextBtn.textContent = '➡ Следующий вопрос';
                nextBtn.style.marginTop = '10px';
                nextBtn.addEventListener('click', () => {
                    testState.currentIndex++;
                    renderQuestion();
                });
                const buttonGroup = document.querySelector('.button-group');
                buttonGroup.appendChild(nextBtn);
                const submitBtn = document.getElementById('submitBtn');
                if (submitBtn) submitBtn.disabled = true;
                const hintBtn = document.getElementById('hintBtn');
                if (hintBtn) hintBtn.disabled = true;
            }
        }
        
        function showFeedback(correct, correctAnswer = null, solution = null) {
            const card = document.querySelector('.question-card');
            let feedbackHtml = '';
            if (correct) {
                feedbackHtml = `<div class="feedback-correct">✅ Верно! Отличная работа!</div>`;
            } else {
                feedbackHtml = `
                    <div class="feedback-wrong">❌ Неверно</div>
                    <div class="solution">
                        <strong>Правильный ответ:</strong> ${correctAnswer}<br><br>
                        <strong>Решение:</strong> ${solution}
                    </div>
                `;
            }
            const feedbackDiv = document.createElement('div');
            feedbackDiv.innerHTML = feedbackHtml;
            card.appendChild(feedbackDiv);
        }
        
        function skipQuestion() {
            const questions = getCurrentQuestions();
            const q = questions[testState.currentIndex];
            testState.answers.push({
                userAnswer: 'пропущено',
                correct: false,
                question: q.question,
                correctAnswer: q.correct_answer,
                solution: q.solution,
                hintsUsed: testState.hintsUsed
            });
            if (!testState.isRetryMode) {
                testState.wrongQuestions.push(testState.currentIndex);
            }
            testState.currentIndex++;
            renderQuestion();
        }
        
        function abortTest() {
            if (confirm('Вы уверены, что хотите прервать тест? Ваш прогресс будет потерян.')) {
                finishTest();
            }
        }
        
        function getUniversityRecommendations(score, total, difficulty) {
            const percent = Math.round((score / total) * 100);
            
            if (difficulty === 'easy') {
                if (score >= 10) {
                    return {
                        message: "🎉 Отличный результат! Вы уверенно владеете базой.",
                        universities: [
                            { name: "НИУ ВШЭ (Москва)", faculty: "Факультет компьютерных наук", score: "85+", description: "Лучший IT-вуз страны." },
                            { name: "МФТИ (Физтех)", faculty: "ФУПМ", score: "90+", description: "Элитный вуз для будущих учёных." }
                        ],
                        suggestion: "⭐ Попробуйте средний уровень сложности."
                    };
                } else if (score >= 7) {
                    return {
                        message: "📚 Хороший результат! Базу вы знаете.",
                        universities: [
                            { name: "РЭУ им. Плеханова", faculty: "Факультет математической экономики", score: "70+", description: "Математика + экономика." },
                            { name: "МГТУ им. Баумана", faculty: "Факультет фундаментальных наук", score: "75+", description: "Ведущий технический вуз." }
                        ],
                        suggestion: "📖 Повторите ошибки."
                    };
                } else {
                    return {
                        message: "😔 Базовый уровень даётся с трудом.",
                        universities: [
                            { name: "МПГУ (Москва)", faculty: "Институт математики и информатики", score: "65+", description: "Педагогическое образование." },
                            { name: "ВолГУ (Волгоград)", faculty: "Институт математики и IT", score: "55+", description: "Региональный вуз." }
                        ],
                        suggestion: "🧠 Начните с формулы."
                    };
                }
            }
            else if (difficulty === 'medium') {
                if (score >= 10) {
                    return {
                        message: "🏆 Отлично! Вы готовы к волгоградским вузам.",
                        universities: [
                            { name: "ВолГУ", faculty: "Институт математики и IT", score: "70+", description: "Крупнейший вуз Волгограда." },
                            { name: "ВолгГТУ", faculty: "Факультет автоматизированных систем", score: "65+", description: "Техническое образование." }
                        ],
                        suggestion: "🔥 Перейдите на сложный уровень."
                    };
                } else if (score >= 7) {
                    return {
                        message: "👍 Неплохо, но нужно подтянуть.",
                        universities: [
                            { name: "ВГСПУ", faculty: "Факультет математики и физики", score: "55+", description: "Педагогическое образование." },
                            { name: "Волгоградский институт бизнеса", faculty: "Экономический факультет", score: "50+", description: "Частный вуз." }
                        ],
                        suggestion: "📘 Повторите ошибки."
                    };
                } else {
                    return {
                        message: "📖 Нужно подтянуть математику.",
                        universities: [
                            { name: "Волгоградский техникум ж/д транспорта", faculty: "СПО", score: "Не требуется", description: "Колледж." },
                            { name: "Волгоградский колледж управления", faculty: "СПО", score: "Не требуется", description: "Колледж." }
                        ],
                        suggestion: "📚 Начните с лёгкого теста."
                    };
                }
            }
            else {
                if (score >= 10) {
                    return {
                        message: "🌟 Вы — математический гений!",
                        universities: [
                            { name: "МГУ им. Ломоносова", faculty: "Мехмат", score: "90+", description: "Легендарный факультет." },
                            { name: "СПбГУ", faculty: "Матмех", score: "85+", description: "Классическое образование." }
                        ],
                        suggestion: "🎓 Попробуйте олимпиады!"
                    };
                } else if (score >= 7) {
                    return {
                        message: "🎓 Достойный результат!",
                        universities: [
                            { name: "МФТИ", faculty: "ФУПМ", score: "80+", description: "Элитный вуз." },
                            { name: "ИТМО", faculty: "Факультет IT", score: "85+", description: "Ведущий IT-вуз." }
                        ],
                        suggestion: "📈 Повторите ошибки."
                    };
                } else {
                    return {
                        message: "📘 Сложный уровень требует практики.",
                        universities: [
                            { name: "НИУ ВШЭ", faculty: "Экономический факультет", score: "75+", description: "Сильный вуз." },
                            { name: "СПбПУ", faculty: "Прикладная математика", score: "70+", description: "Крупный технический вуз." }
                        ],
                        suggestion: "📚 Вернитесь к среднему уровню."
                    };
                }
            }
        }
        
        function finishTest() {
            const total = getCurrentQuestions().length;
            const correct = testState.correctAnswers;
            const percent = Math.round((correct / total) * 100);
            const recommendations = getUniversityRecommendations(correct, total, testState.currentDifficulty);
            
            let buttonsHtml = `
                <button class="btn-success" id="retryWrongBtn">🔄 Повторить ошибки</button>
                <button id="showDiffBtn">📊 Выбрать другой тест</button>
                <button id="goFormulasBtn">📚 Изучить формулы</button>
            `;
            
            if (testState.currentDifficulty === 'easy' && correct >= 10) {
                buttonsHtml += `<button class="btn" id="goMediumBtn">⬆️ Средний уровень</button>`;
            } else if (testState.currentDifficulty === 'medium' && correct >= 10) {
                buttonsHtml += `<button class="btn" id="goHardBtn">⬆️ Сложный уровень</button>`;
            }
            
            let universitiesHtml = `
                <div class="universities">
                    <h4>🎓 Рекомендуемые вузы:</h4>
                    ${recommendations.universities.map(u => `
                        <div class="university">
                            <strong>${u.name}</strong> — ${u.faculty}<br>
                            <small>Проходной балл: ${u.score}</small>
                        </div>
                    `).join('')}
                    <p style="margin-top: 10px; font-style: italic;">💡 ${recommendations.suggestion}</p>
                </div>
            `;
            
            const container = document.getElementById('test-container');
            container.innerHTML = `
                <div class="result-card">
                    <h2>📊 ТЕСТ ЗАВЕРШЁН!</h2>
                    <p style="font-size: 1.5rem; margin: 1rem 0;">Правильных ответов: ${correct} из ${total} (${percent}%)</p>
                    <p>${recommendations.message}</p>
                    ${universitiesHtml}
                    <div class="button-group" style="justify-content: center; margin-top: 1.5rem;">
                        ${buttonsHtml}
                    </div>
                </div>
            `;
            
            document.getElementById('retryWrongBtn').addEventListener('click', retryWrong);
            document.getElementById('showDiffBtn').addEventListener('click', showDifficultySelector);
            document.getElementById('goFormulasBtn').addEventListener('click', () => location.href='formulas.html');
            if (document.getElementById('goMediumBtn')) document.getElementById('goMediumBtn').addEventListener('click', () => switchToDifficulty('medium'));
            if (document.getElementById('goHardBtn')) document.getElementById('goHardBtn').addEventListener('click', () => switchToDifficulty('hard'));
        }
        
        function retryWrong() {
            const questions = testsData[testState.currentDifficulty];
            const wrongIndices = testState.wrongQuestions;
            if (wrongIndices.length === 0) {
                alert('Нет ошибочных вопросов!');
                return;
            }
            const retryQuestions = wrongIndices.map(idx => questions[idx]);
            testState = {
                currentDifficulty: testState.currentDifficulty,
                currentIndex: 0,
                correctAnswers: 0,
                answers: [],
                wrongQuestions: [],
                isRetryMode: true,
                retryData: retryQuestions,
                finalScore: 0,
                totalQuestions: retryQuestions.length,
                currentHints: [],
                hintsUsed: 0
            };
            renderQuestion();
        }
        
        function showDifficultySelector() {
            testState = {
                currentDifficulty: testState.currentDifficulty,
                currentIndex: 0,
                correctAnswers: 0,
                answers: [],
                wrongQuestions: [],
                isRetryMode: false,
                retryData: null,
                finalScore: 0,
                totalQuestions: 12,
                currentHints: [],
                hintsUsed: 0
            };
            const container = document.getElementById('test-container');
            container.innerHTML = `
                <div class="result-card">
                    <h3>Выберите уровень сложности</h3>
                    <div class="difficulty-buttons">
                        <button class="difficulty-btn easy" id="toEasy">🌱 Лёгкий</button>
                        <button class="difficulty-btn medium" id="toMedium">⭐ Средний</button>
                        <button class="difficulty-btn hard" id="toHard">🔥 Сложный</button>
                    </div>
                </div>
            `;
            document.getElementById('toEasy').addEventListener('click', () => switchToDifficulty('easy'));
            document.getElementById('toMedium').addEventListener('click', () => switchToDifficulty('medium'));
            document.getElementById('toHard').addEventListener('click', () => switchToDifficulty('hard'));
        }
        
        function switchToDifficulty(difficulty) {
            testState = {
                currentDifficulty: difficulty,
                currentIndex: 0,
                correctAnswers: 0,
                answers: [],
                wrongQuestions: [],
                isRetryMode: false,
                retryData: null,
                finalScore: 0,
                totalQuestions: 12,
                currentHints: [],
                hintsUsed: 0
            };
            renderDifficultySelector();
            renderQuestion();
        }
        
        // Привязка обработчиков к кнопкам выбора сложности
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const diff = this.dataset.diff;
                switchToDifficulty(diff);
            });
        });
        
        // Инициализация
        applySavedTheme();
        renderDifficultySelector();
        renderQuestion();
    </script>
</body>
</html>
